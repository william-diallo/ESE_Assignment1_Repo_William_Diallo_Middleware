name: Format & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  formatting_linting:
    name: Formatting + Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting/formatting tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install black==24.1.0 isort==5.12.0 flake8==6.0.0

      - name: Run black (format check)
        run: |
          black .
          black --check .

      - name: Run isort (import sorting check)
        run: |
        
          isort --check-only .

      - name: Run flake8
        run: |
          flake8 . --ignore=E501
